# Nuxt SSR (Nitro). Replace placeholders before apply:
#   - image: container image from your registry / pipeline
#   - Ingress host (app.example.com)
#   - NUXT_PUBLIC_API_BASE_URL must match your public API URL (same as API_PUBLIC_URL / Ingress host)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: filesmanager-frontend
  namespace: filesmanager
  labels:
    app: filesmanager-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: filesmanager-frontend
  template:
    metadata:
      labels:
        app: filesmanager-frontend
    spec:
      containers:
        - name: frontend
          image: YOUR_REGISTRY/filesmanager-frontend:master
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
            - name: NUXT_PUBLIC_API_BASE_URL
              value: https://api.example.com
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: filesmanager-frontend
  namespace: filesmanager
  labels:
    app: filesmanager-frontend
spec:
  type: ClusterIP
  selector:
    app: filesmanager-frontend
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: filesmanager-frontend
  namespace: filesmanager
  annotations:
    kubernetes.io/ingress.class: gce
spec:
  rules:
    - host: app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: filesmanager-frontend
                port:
                  number: 3000
