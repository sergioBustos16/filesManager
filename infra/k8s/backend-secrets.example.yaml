# Copy to backend-secrets.yaml (do not commit real values), then:
#   kubectl apply -f infra/k8s/backend-secrets.yaml
#
# Or create via CLI:
#   kubectl create secret generic filesmanager-backend-secrets -n filesmanager \
#     --from-literal=DATABASE_HOST=... \
#     --from-literal=DATABASE_NAME=... \
#     ...
#
# Required keys depend on apps/backend/.env — at minimum wire DB + JWT + storage.
apiVersion: v1
kind: Secret
metadata:
  name: filesmanager-backend-secrets
  namespace: filesmanager
type: Opaque
stringData:
  DATABASE_HOST: "REPLACE"
  DATABASE_PORT: "5432"
  DATABASE_USERNAME: "REPLACE"
  DATABASE_PASSWORD: "REPLACE"
  DATABASE_NAME: "REPLACE"
  JWT_SECRET: "REPLACE"
  JWT_EXPIRES_IN: "1d"
  STORAGE_BACKEND: "gcs"
  GCS_BUCKET: "REPLACE"
  GCS_PROJECT_ID: "REPLACE"
  # LOCAL_STORAGE_ROOT: "storage"   # if STORAGE_BACKEND=local
